[php]
; Sellie fork production defaults. All can be overridden by mounting
; another conf.d/*.ini that loads after this one (PHP_INI_SCAN_DIR
; processes alphabetically — name your override 99-*.ini).

; WordPress upload sizing: matches the typical "no surprise on a
; 200 MB plugin .zip or large media upload" expectation. WP itself
; defaults to 32M which is too small for image-heavy sites.
upload_max_filesize = 512M
post_max_size = 512M

; WP working set runs hot — Uncode/Elementor/WooCommerce can spike
; per-request memory above PHP's 128M default during admin-area
; operations (theme builder save, plugin update). 256M trades
; ~120MB extra container RSS for not OOM-killing on the dashboard.
memory_limit = 256M

; Real-world WP installs hit the default `max_execution_time = 30`
; on plugin updates, theme builder publishes, and bulk imports
; (CSV/WXR). 120s is the WP-recommended ceiling for hosted
; environments. Keep below 300 to surface runaway loops as errors
; rather than container-level timeouts.
max_execution_time = 120

; WP serializes nested arrays to wp_options/postmeta with high
; key counts. The 1000-default trips on Gutenberg-heavy posts.
max_input_vars = 5000

; WP's autoloader stat()s every include path on each request. The
; 16K default realpath cache exhausts within seconds at WP's file
; count and triggers a cache flush per request, defeating the
; point. 4M holds a typical WP+plugins installation comfortably.
; ttl=600 means changes (file edits, plugin updates) take up to
; 10 minutes to surface — fine in production where deploys reset
; the container anyway.
realpath_cache_size = 4M
realpath_cache_ttl = 600
