name: Build & publish (PHP 8.3)

# Sellie fork notes:
#   - Publishes to GHCR (ghcr.io/connorblack/frankenwp) via the
#     auto-provided GITHUB_TOKEN, no Docker Hub creds needed.
#   - Adds a Docker Hub publish step gated on DOCKERHUB_USERNAME +
#     DOCKERHUB_TOKEN secrets being set; skips silently otherwise.
#   - Drops linux/arm/v7 (Coolify host is amd64; Apple Silicon dev gets
#     arm64). Avoids the long emulated builds nobody consumes.

on:
  push:
    branches: ["main", "sellie/*"]
    tags: ["v*.*.*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log into Docker Hub
        if: ${{ secrets.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          # ghcr.io is always; docker hub only when creds are set
          GHCR="ghcr.io/${{ github.repository_owner }}/frankenwp"
          REF_TAG="$(echo "${{ github.ref_name }}" | tr '/' '-')"
          TAGS="${GHCR}:latest-php8.3,${GHCR}:${REF_TAG}-php8.3,${GHCR}:${{ github.sha }}-php8.3"
          if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            DH="${{ secrets.DOCKERHUB_USERNAME }}/frankenwp"
            TAGS="${TAGS},${DH}:latest-php8.3,${DH}:${REF_TAG}-php8.3"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "Computed tags:"
          echo "${TAGS}" | tr ',' '\n' | sed 's/^/  /'

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          build-args: |
            PHP_VERSION=8.3
