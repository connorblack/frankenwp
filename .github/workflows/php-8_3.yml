name: Build & publish (PHP 8.3)

# Sellie fork notes:
#   - Publishes to GHCR (ghcr.io/connorblack/frankenwp) via the
#     auto-provided GITHUB_TOKEN, no Docker Hub creds needed.
#   - Adds a Docker Hub publish step gated on DOCKERHUB_USERNAME +
#     DOCKERHUB_TOKEN secrets being set; skips silently otherwise.
#   - Drops linux/arm/v7 (Coolify host is amd64; Apple Silicon dev gets
#     arm64). Avoids the long emulated builds nobody consumes.

on:
  push:
    branches: ["main", "sellie/*"]
    tags: ["v*.*.*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Docker Hub publish is opt-in: set repo vars DOCKERHUB_USER +
      # DOCKERHUB_TOKEN (token via secrets). Without them, we publish
      # to GHCR only. Note: GitHub forbids `secrets.X` in `if:`
      # conditions, so we route through a `vars` toggle and a guard
      # env var that the login step reads at runtime.
      - name: Log into Docker Hub
        if: ${{ vars.DOCKERHUB_PUBLISH == 'true' }}
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        env:
          DOCKERHUB_PUBLISH: ${{ vars.DOCKERHUB_PUBLISH }}
          DOCKERHUB_USER: ${{ vars.DOCKERHUB_USER }}
        run: |
          GHCR="ghcr.io/${{ github.repository_owner }}/frankenwp"
          REF_TAG="$(echo "${{ github.ref_name }}" | tr '/' '-')"
          TAGS="${GHCR}:latest-php8.3,${GHCR}:${REF_TAG}-php8.3,${GHCR}:${{ github.sha }}-php8.3"
          if [ "${DOCKERHUB_PUBLISH}" = "true" ] && [ -n "${DOCKERHUB_USER}" ]; then
            DH="${DOCKERHUB_USER}/frankenwp"
            TAGS="${TAGS},${DH}:latest-php8.3,${DH}:${REF_TAG}-php8.3"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "Computed tags:"
          echo "${TAGS}" | tr ',' '\n' | sed 's/^/  /'

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          build-args: |
            PHP_VERSION=8.3
