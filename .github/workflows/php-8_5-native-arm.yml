name: Build & publish (PHP 8.5 — native arm matrix)

# Sellie fork experiment: native arm64 runner via build matrix.
#
# The sibling php-8_5.yml workflow uses QEMU emulation for the linux/arm64
# leg, which adds ~5-6 min to the wall time on CGO-heavy builds (xcaddy +
# FrankenPHP-from-source). This workflow runs each arch on its own native
# runner — ubuntu-latest (amd64) + ubuntu-24.04-arm (Cobalt 100 arm64) —
# in parallel, then merges the per-arch digests into a single multi-arch
# manifest in a final `merge` job.
#
# Pushed to a separate tag suffix (`-arm`) so we can run both workflows
# in parallel and compare wall times + verify the resulting images match
# before retiring the QEMU workflow.
#
# Pattern stolen from docker/build-push-action's official multi-arch
# example: https://docs.docker.com/build/ci/github-actions/multi-platform/

on:
  push:
    branches: ["main", "sellie/*"]
    tags: ["v*.*.*"]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/frankenwp

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push by digest
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ matrix.platform }}
          # push-by-digest writes the manifest to GHCR under a digest-only
          # ref (no tag). The `merge` job below stitches the per-arch
          # digests into the canonical tagged manifest.
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          # Per-arch GHA cache scope so amd64 and arm64 don't fight over
          # the same cache key.
          cache-from: type=gha,scope=${{ matrix.arch }}-php8.5
          cache-to: type=gha,scope=${{ matrix.arch }}-php8.5,mode=max
          build-args: |
            PHP_VERSION=8.5
            FRANKENPHP_TAG=1

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch }}-php8.5
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*-php8.5
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          REF_TAG="$(echo "${{ github.ref_name }}" | tr '/' '-')"
          # Note `-arm` suffix on every tag — keeps these distinct from the
          # QEMU workflow's outputs while we A/B them.
          {
            echo "tags<<EOF"
            echo "-t ${IMAGE}:latest-php8.5-arm"
            echo "-t ${IMAGE}:${REF_TAG}-php8.5-arm"
            echo "-t ${IMAGE}:${{ github.sha }}-php8.5-arm"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create + push multi-arch manifest
        working-directory: /tmp/digests
        run: |
          # imagetools create takes per-arch digest refs and stitches them
          # into one OCI manifest list, then pushes under each -t tag.
          docker buildx imagetools create \
            ${{ steps.tags.outputs.tags }} \
            $(printf "${IMAGE}@sha256:%s " *)

      - name: Inspect resulting manifest
        run: |
          docker buildx imagetools inspect "${IMAGE}:latest-php8.5-arm"
