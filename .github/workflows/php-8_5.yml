name: Build & publish (PHP 8.5)

# Sellie fork:
#   - Publishes to GHCR (ghcr.io/connorblack/frankenwp). Auto-provided
#     GITHUB_TOKEN — no Docker Hub creds needed.
#   - Multi-arch via build matrix on native runners: ubuntu-latest (amd64)
#     + ubuntu-24.04-arm (Cobalt 100 arm64), in parallel. The `merge` job
#     stitches per-arch digests into a multi-arch manifest under the
#     canonical tag.
#   - Why not QEMU: emulating arm64 on x86 for CGO-heavy builds (xcaddy +
#     FrankenPHP-from-source) takes 10-25 min per leg. Native parallel
#     finishes a cold build in ~8 min and a cache-hit run in <1 min.
#     Bench: 2026-04-14 — QEMU 23+ min unfinished, native cold 8m43s,
#     native cached 51s.
#   - Pattern from docker/build-push-action's official multi-arch example:
#     https://docs.docker.com/build/ci/github-actions/multi-platform/

on:
  push:
    branches: ["main", "sellie/*"]
    tags: ["v*.*.*"]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/frankenwp
  # Opt every JavaScript-based GHA action into Node 24 so we don't
  # rely on Node 20 (deprecated 2025-09-19; runners switch default
  # to Node 24 on 2026-06-02). This is a no-rewrite escape hatch
  # while individual actions (checkout@v4, upload-artifact@v4,
  # docker/*) catch up with v-suffix bumps that bundle Node 24.
  # https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push by digest
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ matrix.platform }}
          # push-by-digest writes the manifest to GHCR under a digest-only
          # ref (no tag). The `merge` job below stitches the per-arch
          # digests into the canonical tagged manifest.
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          # Per-arch GHA cache scope so amd64 and arm64 don't fight over
          # the same cache key.
          cache-from: type=gha,scope=${{ matrix.arch }}-php8.5
          cache-to: type=gha,scope=${{ matrix.arch }}-php8.5,mode=max
          build-args: |
            PHP_VERSION=8.5
            FRANKENPHP_TAG=1

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch }}-php8.5
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*-php8.5
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create + push multi-arch manifest
        working-directory: /tmp/digests
        env:
          REF_NAME: ${{ github.ref_name }}
          GIT_SHA: ${{ github.sha }}
        run: |
          # Build the tag args + source digest args as bash arrays in
          # this step. Earlier we emitted tag lines into GITHUB_OUTPUT and
          # pulled them in a follow-on step via cross-step substitution —
          # but YAML preserves embedded newlines, which broke shell
          # backslash continuation and bash split the imagetools call
          # into several commands (the first one without sources
          # → "no sources specified").
          REF_TAG="${REF_NAME//\//-}"
          tag_args=(
            -t "${IMAGE}:latest-php8.5"
            -t "${IMAGE}:${REF_TAG}-php8.5"
            -t "${IMAGE}:${GIT_SHA}-php8.5"
          )
          # `*` glob runs in working-directory=/tmp/digests, where each
          # per-arch leg uploaded a file named after its sha256 digest.
          source_args=()
          for digest in *; do
            source_args+=( "${IMAGE}@sha256:${digest}" )
          done
          echo "tags:    ${tag_args[*]}"
          echo "sources: ${source_args[*]}"
          docker buildx imagetools create "${tag_args[@]}" "${source_args[@]}"

      - name: Inspect resulting manifest
        run: |
          docker buildx imagetools inspect "${IMAGE}:latest-php8.5"

  scan:
    # CVE scan, non-blocking. Runs after the multi-arch image is
    # published so we can report against the canonical tag. Findings
    # land as a SARIF file uploaded to the GitHub Security tab; we
    # don't fail the build on findings (would block deploys for
    # unfixable upstream CVEs that we'd accept the risk on anyway).
    # https://github.com/aquasecurity/trivy-action
    runs-on: ubuntu-latest
    needs: merge
    permissions:
      contents: read
      security-events: write
      packages: read
    steps:
      - name: Run Trivy on the multi-arch image (HIGH+CRITICAL)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.IMAGE }}:latest-php8.5
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          # Continue past Trivy's own exit-code on findings.
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        # always(): even if Trivy errors, surface what we have.
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy
